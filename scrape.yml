name: Scrape IFB Projects

on:
  schedule:
    # Runs every 24 hours at 06:00 UTC (09:30 Tehran time)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub website (one click)

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper.py

      - name: Commit updated data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "auto: update IFB data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
